<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flip Clock 3D Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="main-wrapper">
    <div class="clock-container">
      <div class="flip-group">
        <div class="card" id="hours"></div>
        <span class="label">Horas</span>
      </div>
      <div class="separator">:</div>
      <div class="flip-group">
        <div class="card" id="minutes"></div>
        <span class="label">Minutos</span>
      </div>
      <div class="separator">:</div>
      <div class="flip-group">
        <div class="card" id="seconds"></div>
        <span class="label">Segundos</span>
      </div>
    </div>
    <div class="date-display" id="date-display"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
